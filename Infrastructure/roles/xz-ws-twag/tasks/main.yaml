 # :vim: set ft=ansible :

 - tags: xz-ws, twag
   block:
    - name: Create xz.ws twag app
      dokku_app:
         app: xz.ws-twag

    - name: Set domain for xz.ws twag app
      dokku_domains:
         app: xz.ws-twag
         domains: xz.ws
         state: present

    - name: Configure environment for xz.ws twag app
      dokku_config:
         app: xz.ws-twag
         config:
            POSTGRES_URL: "{{ lookup('env', 'XZ_WS_POSTGRES_URL') }}"
            NOTION_TOKEN: "{{ lookup('env', 'XZ_WS_NOTION_TOKEN') }}"
            NOTION_THINGS_DB: "{{ lookup('env', 'XZ_WS_NOTION_THINGS_DB') }}"
            NOTION_THINGS_DS: "{{ lookup('env', 'XZ_WS_NOTION_THINGS_DS') }}"
            NOTION_THINGS_COLUMN_NAME: "{{ lookup('env', 'XZ_WS_NOTION_THINGS_COLUMN_NAME') }}"
            NOTION_CONTAINERS_DB: "{{ lookup('env', 'XZ_WS_NOTION_CONTAINERS_DB') }}"
            NOTION_CONTAINERS_DS: "{{ lookup('env', 'XZ_WS_NOTION_CONTAINERS_DS') }}"
            NOTION_CONTAINERS_COLUMN_NAME: "{{ lookup('env', 'XZ_WS_NOTION_CONTAINERS_COLUMN_NAME') }}"
            RUST_LOG: info
            RUST_FMT: json

    - name: Configure caddy-docker-proxy labels for xz.ws twag app
      dokku_docker_options:
         app: xz.ws-twag
         phase: deploy
         option: >-
            --label=caddy='xz.ws' --label=caddy.reverse_proxy={%raw%}'/* {{upstreams http 3000}}'{%endraw%}
         state: present

    - name: Sync twag repo
      dokku_clone:
         app: xz.ws-twag
         repository: https://github.com/ELLIOTTCABLE/twag.git
         version: main
         build: false
      register: twag_sync

    - name: Rebuild twag if repo changed
      ansible.builtin.command: dokku ps:rebuild xz.ws-twag
      when: twag_sync.changed
      changed_when: true
