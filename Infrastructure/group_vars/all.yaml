mail_smtp_server: "{{ lookup('pipe', 'op read \"op://Elliott - Work-visible/ProtonMail SMTP - admin-at-from.ec/SMTP/SMTP server\"') }}"
mail_pw: "{{ lookup('pipe', 'op read \"op://Elliott - Work-visible/ProtonMail SMTP - admin-at-from.ec/SMTP/password\"') }}"
mail_port: "{{ lookup('pipe', 'op read \"op://Elliott - Work-visible/ProtonMail SMTP - admin-at-from.ec/SMTP/port number\"') }}"
