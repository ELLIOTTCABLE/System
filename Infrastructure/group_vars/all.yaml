# :vim: set ft=ansible :
sshpub_location: "{{ lookup('env', 'HOME') }}/.ssh/identities/personal/identity.pub"
root_pw: "!" # disables root password, same as `passwd -L`
ssh_port: 58266
ansible_port: 58266

user_name: ec
user_pw: "{{ lookup('pipe', 'op read \"op://Elliott - Work-visible/' + inventory_hostname + '/password\"') | password_hash('sha512', 'lilysalt') }}"

mail_to: admin@from.ec
